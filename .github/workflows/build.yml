name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  actions: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: linux-x64
            artifact: BulkRenamerPRO
            add_data_sep: ':'
            gui_flag: ''
            ext: ''

          - os: windows-2022
            name: windows-x64
            artifact: BulkRenamerPRO.exe
            add_data_sep: ';'
            gui_flag: '--noconsole'
            ext: '.exe'

          - os: macos-13
            name: macos-x64
            artifact: BulkRenamerPRO
            add_data_sep: ':'
            gui_flag: '--windowed'
            ext: ''

          - os: macos-latest
            name: macos-arm64
            artifact: BulkRenamerPRO
            add_data_sep: ':'
            gui_flag: '--windowed'
            ext: ''

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xinerama0 libxcb-xkb1 libxkbcommon-x11-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller \
            --onefile \
            ${{ matrix.gui_flag }} \
            --name BulkRenamerPRO \
            --add-data "renamer${{ matrix.add_data_sep }}renamer" \
            --hidden-import PyQt6.QtCore \
            --hidden-import PyQt6.QtGui \
            --hidden-import PyQt6.QtWidgets \
            main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bulkrenamer-${{ matrix.name }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
